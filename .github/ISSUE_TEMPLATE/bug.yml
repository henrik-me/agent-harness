name: Bug report
description: Report something that is not working as expected.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For security issues, do not use this form;
        report privately via GitHub Security Advisory instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: The harness did X, but I expected Y.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest set of commands or files needed to reproduce.
      placeholder: |
        1. Run `...`
        2. Observe `...`
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node.js version, harness version or git ref, and install method.
      placeholder: |
        OS:
        Node:
        Harness ref:
        Install method:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste logs or command output. Redact secrets.
      render: shell
    validations:
      required: false
