name: Feature request
description: Propose a new harness capability or improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow gap or user need should this address?
      placeholder: I need to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, CLI, docs, or process change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternate designs did you consider?
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This change should preserve existing behavior unless explicitly documented as breaking.
          required: true
        - label: I have checked for existing issues or clickstops covering this request.
          required: false
