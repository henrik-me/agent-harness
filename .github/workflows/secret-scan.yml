name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download v8.30.1 \
            --repo gitleaks/gitleaks \
            --pattern gitleaks_8.30.1_linux_x64.tar.gz \
            --pattern gitleaks_8.30.1_checksums.txt
          grep 'gitleaks_8.30.1_linux_x64.tar.gz$' gitleaks_8.30.1_checksums.txt | sha256sum --check -
          tar -xzf gitleaks_8.30.1_linux_x64.tar.gz gitleaks
          ./gitleaks version

      - name: Run gitleaks
        run: ./gitleaks dir . --redact --exit-code 1
